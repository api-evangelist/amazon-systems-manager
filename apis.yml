name: Amazon Systems Manager
description: AWS Systems Manager is an operational management service that provides a unified interface for managing AWS resources and on-premises infrastructure. It enables automation of operational 
  tasks, configuration management, patch management, parameter storage, and run command execution across your hybrid cloud environment at scale.
image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
url: https://aws.amazon.com/systems-manager/
created: '2024-01-15'
modified: '2026-04-19'
apis:
- name: AWS Systems Manager API
  description: >-
    The AWS Systems Manager API provides programmatic access to manage and
    automate operational tasks across your AWS and on-premises infrastructure.
    It enables developers to run commands on managed instances, manage
    parameters and secrets, create automation documents, configure patch
    baselines, manage inventory, and set up maintenance windows.
