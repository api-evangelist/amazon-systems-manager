apis:
- name: AWS Systems Manager API
  description: >-
    The AWS Systems Manager API provides programmatic access to manage and
    automate operational tasks across your AWS and on-premises infrastructure.
    It enables developers to run commands on managed instances, manage
    parameters and secrets, create automation documents, configure patch
    baselines, manage inventory, and set up maintenance windows.
