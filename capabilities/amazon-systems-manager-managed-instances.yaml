naftiko: 1.0.0-alpha2
info:
  label: Amazon Systems Manager — Managed Instances
  description: 'Amazon Systems Manager — Managed Instances. 1 operations. Lead operation: Amazon Systems Manager Describe
    Instance Information. Self-contained Naftiko capability covering one Amazon Systems Manager business surface.'
  tags:
  - Amazon Systems Manager
  - Managed Instances
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_SYSTEMS_MANAGER_API_KEY: AMAZON_SYSTEMS_MANAGER_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-systems-manager-managed-instances
    baseUri: https://ssm.amazonaws.com
    description: Amazon Systems Manager — Managed Instances business capability. Self-contained, no shared references.
    resources:
    - name: '#DescribeInstanceInformation'
      path: /#DescribeInstanceInformation
      operations:
      - name: describeinstanceinformation
        method: POST
        description: Amazon Systems Manager Describe Instance Information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: amazon-systems-manager-managed-instances-rest
    port: 8080
    description: REST adapter for Amazon Systems Manager — Managed Instances. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/describeinstanceinformation
      name: describeinstanceinformation
      description: 'REST surface for #DescribeInstanceInformation.'
      operations:
      - method: POST
        name: describeinstanceinformation
        description: Amazon Systems Manager Describe Instance Information
        call: amazon-systems-manager-managed-instances.describeinstanceinformation
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-systems-manager-managed-instances-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Systems Manager — Managed Instances. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-systems-manager-describe-instance
      description: Amazon Systems Manager Describe Instance Information
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-systems-manager-managed-instances.describeinstanceinformation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
