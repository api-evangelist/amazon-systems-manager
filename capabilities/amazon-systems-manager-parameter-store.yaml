naftiko: 1.0.0-alpha2
info:
  label: Amazon Systems Manager — Parameter Store
  description: 'Amazon Systems Manager — Parameter Store. 2 operations. Lead operation: Amazon Systems Manager Get Parameter.
    Self-contained Naftiko capability covering one Amazon Systems Manager business surface.'
  tags:
  - Amazon Systems Manager
  - Parameter Store
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_SYSTEMS_MANAGER_API_KEY: AMAZON_SYSTEMS_MANAGER_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-systems-manager-parameter-store
    baseUri: https://ssm.amazonaws.com
    description: Amazon Systems Manager — Parameter Store business capability. Self-contained, no shared references.
    resources:
    - name: '#GetParameter'
      path: /#GetParameter
      operations:
      - name: getparameter
        method: POST
        description: Amazon Systems Manager Get Parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: '#PutParameter'
      path: /#PutParameter
      operations:
      - name: putparameter
        method: POST
        description: Amazon Systems Manager Put Parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: amazon-systems-manager-parameter-store-rest
    port: 8080
    description: REST adapter for Amazon Systems Manager — Parameter Store. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/getparameter
      name: getparameter
      description: 'REST surface for #GetParameter.'
      operations:
      - method: POST
        name: getparameter
        description: Amazon Systems Manager Get Parameter
        call: amazon-systems-manager-parameter-store.getparameter
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/putparameter
      name: putparameter
      description: 'REST surface for #PutParameter.'
      operations:
      - method: POST
        name: putparameter
        description: Amazon Systems Manager Put Parameter
        call: amazon-systems-manager-parameter-store.putparameter
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-systems-manager-parameter-store-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Systems Manager — Parameter Store. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-systems-manager-get-parameter
      description: Amazon Systems Manager Get Parameter
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: amazon-systems-manager-parameter-store.getparameter
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-systems-manager-put-parameter
      description: Amazon Systems Manager Put Parameter
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-systems-manager-parameter-store.putparameter
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
